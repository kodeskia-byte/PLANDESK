services:
  postgres:
    image: postgres:16-alpine
    container_name: shekina_db
    environment:
      POSTGRES_USER: shekina
      POSTGRES_PASSWORD: shekina123
      POSTGRES_DB: shekina_db
    ports:
      - "5432:5432"
    volumes:
      - shekina_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shekina -d shekina_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  shekina_pgdata:
