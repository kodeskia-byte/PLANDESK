# Render Blueprint — PlantDesk / SHEKINA S-MART LUB
# https://render.com/docs/blueprint-spec
#
# Despliegue: conectar repo en Render → New → Blueprint → seleccionar este archivo.
# Tras el deploy, abrir la URL del servicio web e iniciar sesión con las credenciales demo.

databases:
  - name: plantdesk-db
    databaseName: plantdesk
    user: plantdesk
    plan: free

services:
  - type: web
    name: plantdesk
    runtime: python
    plan: free
    buildCommand: bash scripts/render-build.sh
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DATABASE_URL
        fromDatabase:
          name: plantdesk-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SEED_DEMO
        value: "true"
      - key: SERVE_STATIC
        value: "true"
      - key: CORS_ORIGINS
        value: "http://localhost:5173,http://127.0.0.1:5173"
